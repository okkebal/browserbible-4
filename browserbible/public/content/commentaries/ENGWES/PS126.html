<div class="section PS126" data-id="PS126">
<div class="verse-note" id="PS126_1"><span class="verse-ref">1</span> When - Thou dost truly love wisdom.</div>
<div class="verse-note" id="PS126_4"><span class="verse-ref">4</span> Darkness - Of sin.</div>
<div class="verse-note" id="PS126_6"><span class="verse-ref">6</span> Crooked - Who swerve from the straight way of God's law, and have windings and turnings, to escape conviction.</div>
</div>

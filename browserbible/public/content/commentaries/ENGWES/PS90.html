<div class="section PS90" data-id="PS90">
<div class="verse-note" id="PS90_2"><span class="verse-ref">2</span> Afflicted - With sickness.</div>
<div class="verse-note" id="PS90_5"><span class="verse-ref">5</span> Word - His command, or blessing.</div>
<div class="verse-note" id="PS90_17"><span class="verse-ref">17</span> Exalt him - In public assemblies, and before all persons, as they have opportunity. Elders - The magistrates or rulers; let them not be ashamed nor afraid to speak of God's wonderful works, before the greatest of men.</div>

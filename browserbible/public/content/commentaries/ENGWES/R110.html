<div class="section R110" data-id="R110">
<div class="verse-note" id="R110_4"><span class="verse-ref">4</span> The sons - Of Amram or Izhar, Kohath's sons, (Numb 3:27), otherwise Elizaphan, ver.(8), and Hebron, ver.(9), and Uzziel, ver.(10), were Kohath's children.</div>
<div class="verse-note" id="R110_10"><span class="verse-ref">10</span> The Priests - Abiathar the high - priest, and Zadok the second priest.</div>

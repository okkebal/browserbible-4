<div class="section JR19" data-id="JR19">
<div class="verse-note" id="JR19_3"><span class="verse-ref">3</span> Who hast set signs - Who didst wonders of justice in the land of Egypt, such as are remembered even to this day.</div>
<div class="verse-note" id="JR19_7"><span class="verse-ref">7</span> The mounts - Rather engines of war with which those nations used to batter walls, or to shoot great stones into places besieged.</div>
</div>

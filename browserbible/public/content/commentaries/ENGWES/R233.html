<div class="verse-note" id="R233_8"><span class="verse-ref">8</span> Beth - lehem - And so these were the remainders of the inhabitants of that city. (And the like may be said of the two following names, Netophah and Anathoth, or others of the like nature.) So little was Beth - lehem among the thousands of Judah! Yet thence must the Messiah arise.</div>

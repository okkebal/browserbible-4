<div class="section PS4" data-id="PS4">
<div class="verse-note" id="PS4_2"><span class="verse-ref">2</span> Of hosts - Under whose command are all the hosts of heaven and earth, angels and men, and all other creatures.</div>
<div class="verse-note" id="PS4_3"><span class="verse-ref">3</span> Ashamed - Disappointed of my hope.</div>
<div class="verse-note" id="PS4_4"><span class="verse-ref">4</span> Cause - Without any provocation of mine.</div>
<div class="verse-note" id="PS4_5"><span class="verse-ref">5</span> Teach - Teach me my duty, and cause me to keep close to it, notwithstanding all temptations.</div>
</div>

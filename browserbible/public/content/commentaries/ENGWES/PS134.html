<div class="section PS134" data-id="PS134">
<div class="verse-note" id="PS134_1"><span class="verse-ref">1</span> For - They cannot sleep with quietness.</div>
<div class="verse-note" id="PS134_2"><span class="verse-ref">2</span> For - Wickedness is as pleasant to them as their bread.</div>
<div class="verse-note" id="PS134_3"><span class="verse-ref">3</span> But - Just men daily grow in knowledge, and grace, and consolation, 'till all be perfected and swallowed up in glory.</div>
</div>

<div class="verse-note" id="PS123_1"><span class="verse-ref">1</span> Called - By my ministers, by my judgments, and by the motions of my spirit and your own conscience.</div>
<div class="verse-note" id="PS123_3"><span class="verse-ref">3</span> Your fear - The misery you do or should fear.</div>

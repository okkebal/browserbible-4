<div class="section PS125" data-id="PS125">
<div class="verse-note" id="PS125_1"><span class="verse-ref">1</span> Seek her - With unwearied diligence and earnest desire and patient expectation.</div>
<div class="verse-note" id="PS125_5"><span class="verse-ref">5</span> Path of judgment - Righteous paths, judgment being here put for righteousness. And keeping of paths may be put for keeping them in their paths.</div>

<div class="section JR29" data-id="JR29">
<div class="verse-note" id="JR29_5"><span class="verse-ref">5</span> Good or evil - Whether grateful or ungrateful to us.</div>
<div class="verse-note" id="JR29_9"><span class="verse-ref">9</span> I repent - I am satisfied with the punishment your nation hath undergone, and as to the remainder, will change the course of my providence.</div>
<div class="verse-note" id="JR29_29"><span class="verse-ref">29</span> Tahpanhes - It was at this time the place where the king of Egypt made his residence.</div>
</div>

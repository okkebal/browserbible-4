<div class="section PS116" data-id="PS116">
<div class="verse-note" id="PS116_6"><span class="verse-ref">6</span> Judge - Will in due time plead the cause of his people. Repent - He will recall that severe sentence which for their sins he had passed upon them.</div>
<div class="verse-note" id="PS116_16"><span class="verse-ref">16</span> The God of gods - Who is infinitely superior to all that are called gods, whether angels, or princes, or idols.</div>

<div class="section R22" data-id="R22">
<div class="verse-note" id="R22_14"><span class="verse-ref">14</span> The house - He built this house for her; because the ark was now in the house of David, which therefore ought to be kept pure and free from the very danger and appearance of pollution.</div>
<div class="verse-note" id="R22_17"><span class="verse-ref">17</span> Man of God - A prophet inspired by God in these matters, whose commands therefore are the commands of God.</div>

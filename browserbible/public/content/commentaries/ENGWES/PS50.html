<div class="verse-note" id="PS50_15"><span class="verse-ref">15</span> A wonder - For my many and sore calamities.</div>
<div class="verse-note" id="PS50_23"><span class="verse-ref">23</span> The numbers - Of thy salvations and mercies vouchsafed to me.</div>

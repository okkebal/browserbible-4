<div class="verse-note" id="PS87_2"><span class="verse-ref">2</span> Land - Their country. In chambers - Which entered into the chambers. Kings - Of Pharaoh and his sons, and his chief nobles and governors.</div>
<div class="verse-note" id="PS87_3"><span class="verse-ref">3</span> Coasts - In all their land, even to the utmost borders of it.</div>

<div class="section PS93" data-id="PS93">
<div class="verse-note" id="PS93_1"><span class="verse-ref">1</span> Desolate places - Into which they are fled for fear and shame.</div>
<div class="verse-note" id="PS93_2"><span class="verse-ref">2</span> Catch - Heb. ensnare, take away not only by oppression but also by cunning artificers. Stranger - Who hath no right to his goods.</div>
</div>

<div class="comm-section"><br><br>4-5. In view of the desert of sins to be confessed, the writer invokes God's covenant mercy to himself and the Church, in whose welfare he rejoices. The speaker, me, I, is not the Psalmist himself, but the people, the present generation (compare Psa 106:6). <br>visit--(Compare Psa 8:4).</div>

<div class="section IS61" data-id="IS61">
<div class="comm-section"><br><br>121-126. On the grounds of his integrity, desire for God's word, and covenant relation to Him, the servant of God may plead for His protecting care against the wicked, gracious guidance to the knowledge of truth, and His effective vindication of the righteous and their cause, which is also His own.</div>

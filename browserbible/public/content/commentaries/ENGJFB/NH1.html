<div class="comm-section"><br><br>8. nine--The number of David's sons born after his removal to Jerusalem, was eleven (2Sa 5:14), but only nine are mentioned here: two of them being omitted, either in consequence of their early deaths or because they left no issue. <br> 1Ch 3:10-16. His Line to Zedekiah.</div>

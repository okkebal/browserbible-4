<div class="comm-section"><br><br>61-62. the children of Barzillai--He preferred that name to that of his own family, deeming it a greater distinction to be connected with so noble a family, than to be of the house of Levi. But by this worldly ambition he forfeited the dignity and advantages of the priesthood.</div>

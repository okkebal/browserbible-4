<div class="comm-section"><br><h3>CHAPTER 50</h3> <h3>Ge 50:1-26. Mourning for Jacob.</h3> <br>1. Joseph fell upon his father's face, &c.--On him, as the principal member of the family, devolved the duty of closing the eyes of his venerable parent (compare Ge 46:4) and imprinting the farewell kiss.</div>

<div class="comm-section"><br><br>7. fowl--rather, "ravenous bird," or "eagle," which is the most sharp-sighted of birds (Is 46:11). A vulture will spy a carcass at an amazing distance. The miner penetrates the earth by a way unseen by birds of keenest sight.</div>

<div class="section MC2" data-id="MC2">
<div class="comm-section"><br><br>3. cause you to dwell--permit you still to dwell (Jr 18:11; 26:13).</div>
<div class="comm-section"><br><br>8. that cannot profit--Maurer translates, "so that you profit nothing" (see Jr 7:4; Jr 5:31).</div>
<div class="comm-section"><br><br>13. rising ... early--implying unwearied earnestness in soliciting them (Jr 7:25; Jr 11:17; 2Ch 36:15).</div>

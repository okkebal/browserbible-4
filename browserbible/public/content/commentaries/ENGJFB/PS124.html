<div class="section PS124" data-id="PS124">
<div class="comm-section"><br><br>7. (1Pe 3:12). God does not forsake the godly, as Job implied, but "establishes," or makes them sit on the throne as kings (1Sa 2:8; Psa 113:7, 8). True of believers in the highest sense, already in part (1Pe 2:9; Re 1:6); hereafter fully (Re 5:10; Job 22:5). <br>and they are--that they may be.</div>

<div class="section JH2" data-id="JH2">
<div class="comm-section"><br><br>26. (Pr 1:11, 17, 18; Ha 1:15). <br>as he that setteth snares--rather, "as fowlers crouch" [Maurer]. <br>trap--literally, "destruction": the instrument of destruction. <br>catch men--not as Peter, to save (Lu 5:10), but to destroy men.</div>

<div class="section IS12" data-id="IS12">
<div class="comm-section"><br><br>13-16. Obedience would have secured all promised blessings and the subjection of foes. In this passage, "should have," "would have," &c., are better, "should" and "would" expressing God's intention at the time, that is, when they left Egypt.</div>

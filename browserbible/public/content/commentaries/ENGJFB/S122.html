<div class="section S122" data-id="S122">
<div class="comm-section"><br><br>17-18. Sisera fled ... to the tent of Jael--According to the usages of nomadic people, the duty of receiving the stranger in the sheik's absence devolves on his wife, and the moment the stranger is admitted into his tent, his claim to be defended or concealed from his pursuers is established.</div>

<div class="comm-section"><br><br>18. Hast thou--as God doth (Job 28:24).</div>
<div class="comm-section"><br><br>19-38. The marvels in heaven. "What is the way (to the place wherein) light dwelleth?" The origin of light and darkness. In Ge 1:3-5, 14-18, "light" is created distinct from, and previous to, light-emitting bodies, the luminaries of heaven.</div>

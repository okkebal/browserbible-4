<div class="comm-section"><br><br>6-7. They are as ravening dogs seeking prey, and as such, <br>belch out--that is, slanders, their impudent barkings.</div>
<div class="comm-section"><br><br>12. let them even be ... taken in their pride--while evincing it--that is, to be punished for their lies, &c.</div>

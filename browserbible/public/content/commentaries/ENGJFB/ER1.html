<div class="comm-section"><br><br>10-17. And the Lord spake by his servants the prophets--These were Hosea, Joel, Nahum, Habakkuk, and Isaiah. Their counsels, admonitions, and prophetic warnings, were put on record in the national chronicles (2Ch 33:18) and now form part of the sacred canon.</div>

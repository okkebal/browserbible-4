<div class="verse-note" id="PS30_6"><span class="verse-ref">6</span> Alamoth, "soprano," from almah, a virgin. Some have thought the alamoth, "virgins," were a temple choir, singing antiphonally to the sheminith, or male choir. (See Scofield "Psalms 6:1"). But contr, see 1 Chronicles 15:20.   <chapter n="49" osisID="Ps.49"</div>

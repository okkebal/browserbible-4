<div class="verse-note" id="LV5_6"><span class="verse-ref">6</span> trespass offering   The trespass-offerings have in view rather the injury which sin does than its guilt-- which is the sin-offering aspect. What is due to God's rights in every human being is here meant. Psalms 51:4, is a perfect expression of this.</div>
<div class="verse-note" id="LV5_10"><span class="verse-ref">10</span> atonement (See Scofield "Exodus 29:33"). <div sID="gen613"</div>

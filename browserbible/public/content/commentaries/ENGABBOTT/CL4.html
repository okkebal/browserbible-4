<div class="section CL4" data-id="CL4">
<div class="comm-section"><br>Risen with Christ; 2:12.</div>
<div class="comm-section"><br>Dead; that is, your former life of worldliness and sin was ended by your union with Christ.</div>
<div class="comm-section"><br>Mortify—your members; keep evil propensities under strict subjection.</div>
<div class="comm-section"><br>Sometime; formerly.</div>
<div class="comm-section"><br>The old man; the former man.</div>
</div>

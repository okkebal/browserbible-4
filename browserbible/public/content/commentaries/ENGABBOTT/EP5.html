<div class="section EP5" data-id="EP5">
<div class="comm-section"><br>Whereby ye are sealed; that is, which is the pledge and earnest of redemption.</div>
<div class="comm-section"><br>Not convenient; not proper, not consistent with your Christian profession.</div>
<div class="comm-section"><br>Who is an idolater; worshipping money as his god.</div>
<div class="comm-section"><br>Vain words; vain and false excuses for such sins.</div>
<div class="comm-section"><br>Sometime darkness; some time in darkness.</div>
</div>

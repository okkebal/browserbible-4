<div class="section PS125" data-id="PS125">
<div class="verse-note" id="PS125_1"><span class="verse-ref">1</span> If thou seekest her as silver, and searchest for her as [for] hid {d} treasures; (d) Showing that no labour must be spared.</div>
<div class="verse-note" id="PS125_2"><span class="verse-ref">2</span> Then shalt thou understand the fear of the LORD, and find the {e} knowledge of God. (e) This (he says) is the true wisdom to know and fear God.</div>
</div>

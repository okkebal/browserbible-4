<div class="verse-note" id="K225_6"><span class="verse-ref">6</span> Chapter 3  Genealogies.    --Of all the families of Israel, none were so illustrious as the family of David: here we have a full account of it. From this family, as concerning the flesh, Christ came. The attentive observer will perceive that the children of the righteous enjoy many advantages.</div>
